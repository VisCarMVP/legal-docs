<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="vc-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6d3408"/>
      <stop offset="100%" stop-color="#a85820"/>
    </linearGradient>
    <linearGradient id="vc-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#eb8c2e"/>
      <stop offset="100%" stop-color="#b8551a"/>
    </linearGradient>
    <filter id="vc-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Square navy background — matches the site palette (var(--bg3) #0a1628). -->
  <rect width="256" height="256" fill="#0a1628"/>

  <!-- Two-tone chevron: left half darker, right half brighter, with a
       central V-notch at the base so it reads as a navigation cursor. -->
  <g filter="url(#vc-shadow)">
    <path d="M128 52 L60 202 L128 178 Z" fill="url(#vc-left)"/>
    <path d="M128 52 L196 202 L128 178 Z" fill="url(#vc-right)"/>
  </g>
</svg>
